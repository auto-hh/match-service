services:
    kafka:
        image: apache/kafka:3.9.0
        container_name: kafka
        hostname: kafka
        env_file:
            - kafka.env
        expose:
            - 9092
        ports:
            - 9092:9092
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
                ]
            interval: 10s
            timeout: 10s
            retries: 15
        restart: unless-stopped
    llm:
        build:
            context: .
            dockerfile: Dockerfile
        hostname: llm
        env_file:
            - .env
        depends_on:
            kafka:
                condition: service_healthy
        restart: unless-stopped
