name: Build

on:
    push:
        branches: [main, dev]

jobs:
    llm:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Login to container registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up buildx
              uses: docker/setup-buildx-action@v4

            - name: Build
              id: push
              uses: docker/build-push-action@v7
              with:
                  context: ./
                  file: ./Dockerfile
                  push: true
                  tags: ghcr.io/auto-hh/llm:latest
